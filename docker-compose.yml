services:
  redis:
    image: redis:8-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-cartolapy_secret_password}
    ports:
      - "6379:6379"
    networks:
      - cartolapy
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-cartolapy_secret_password}",
          "ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn src.main:get_app --host 0.0.0.0 --port 8000
    ports:
      - "8922:8000"
    environment:
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379
      - API_KEY=${API_KEY}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - ENVIRONMENT=production
      - CORS_ORIGINS=http://frontend:80,http://localhost:8501
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cartolapy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:80"
    depends_on:
      - backend
    networks:
      - cartolapy

  taskiq-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: taskiq worker src.tkq:broker --workers 1
    environment:
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379
      - ENVIRONMENT=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cartolapy

  taskiq-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: taskiq scheduler src.tkq_sched:scheduler
    environment:
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379
      - ENVIRONMENT=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cartolapy

networks:
  cartolapy:
    driver: bridge
