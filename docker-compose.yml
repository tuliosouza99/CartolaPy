services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn backend.main:get_app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    networks:
      - cartolapy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:80"
    depends_on:
      - backend
    networks:
      - cartolapy

  taskiq-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: taskiq worker backend.tkq:broker
    networks:
      - cartolapy

  taskiq-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: taskiq scheduler backend.tkq_sched:scheduler
    networks:
      - cartolapy

networks:
  cartolapy:
    driver: bridge
